############################################################
# GitHub Actions
# Daily GeoScen Central Bank RATES Refresh
############################################################

name: Daily GeoScen CB RATES Refresh

on:
  schedule:
    - cron: "20 11 * * *"
  workflow_dispatch:

jobs:
  refresh-cb-rates:
    runs-on: ubuntu-latest

    env:
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT_URL }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_REGION: auto

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pyarrow requests beautifulsoup4 boto3 awscli pypdf

      - name: Set PYTHONPATH
        run: |
          echo "PYTHONPATH=${{ github.workspace }}/src" >> $GITHUB_ENV

      - name: Refresh Federal Reserve
        run: python -m spine.jobs.geoscen.cb.refresh_cb --bank FED

      - name: Refresh European Central Bank
        run: python -m spine.jobs.geoscen.cb.refresh_cb --bank ECB

      - name: Build Policy Language
        run: python -m spine.jobs.rates.build_policy_language_latest_all

      - name: Upload Policy Language
        run: python -m spine.jobs.rates.upload_policy_language_to_r2

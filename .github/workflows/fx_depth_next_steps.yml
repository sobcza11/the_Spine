name: FX Depth Next Steps Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "30 11 * * 1-5"

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
      EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
      R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: spine_us
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install pandas pyarrow boto3 python-dotenv

      - name: Pull FTSE vs SPX proxies
        run: python src/spine/jobs/fx_depth/pull_ftse_spx_tiingo.py

      - name: Build FX Depth Ratio Metrics
        run: python src/spine/jobs/fx_depth/build_fx_depth_ratio_metrics.py

      - name: Upload FX Depth Serving to R2
        run: python src/spine/jobs/fx_depth/upload_fx_depth_serving_to_r2.py


name: WTI Inventory Refresh

on:
  schedule:
    - cron: "20 17 * * 3"
  workflow_dispatch:

jobs:
  refresh_wti_inventory:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: ${{ github.workspace }}/src
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_REGION: ${{ secrets.R2_REGION }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pandas pyarrow openpyxl boto3 xlrd

      - run: python -m spine.jobs.energy.wti.build_wti_inventory

      - run: python -m spine.jobs.energy.wti.build_wti_inventory_oc_overlay
      
      - name: Build USD/CAD WTI inventory depth
        run: python src/spine/jobs/fx_depth/build_usdcad_wti_inventory_depth.py

      - name: Merge USD/CAD WTI inventory into FX depth
        run: python src/spine/jobs/fx_depth/merge_usdcad_wti_inventory_into_fx_depth.py

      - name: Upload FX depth serving to R2
        run: python -m spine.jobs.fx_depth.upload_fx_depth_serving_to_r2

      - name: Verify FX spreads serving JSON exists
        run: |
          ls -la data/serving/fx || true

          if [ ! -f data/serving/fx/fx_spreads_data.json ]; then
            echo "Missing fx_spreads_data.json in runner."
            echo "Available FX serving files:"
            find data/serving/fx -maxdepth 1 -type f -print
            exit 1
          fi

      - name: Upload FINSTATE serving files to R2
        run: python -m spine.jobs.finstate.upload_finstate_serving_to_r2
        env:
          PYTHONPATH: ${{ github.workspace }}/src
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_REGION: ${{ secrets.R2_REGION }}        
          
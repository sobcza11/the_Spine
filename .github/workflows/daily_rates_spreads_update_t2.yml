name: daily_rates_spreads_update_t2

on:
  schedule:
    - cron: "15 11 * * 1-5"
  workflow_dispatch: {}

concurrency:
  group: rates-spreads-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    env:
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir -r ./requirements.ci.txt

      - name: Build spreads
        shell: bash
        run: |
          PYTHONPATH="${GITHUB_WORKSPACE}/src" python src/spine/jobs/rates/derive/build_rates_spreads_t2.py

      - name: Validate spreads
        shell: bash
        run: |
          PYTHONPATH="${GITHUB_WORKSPACE}/src" python src/spine/jobs/rates/validate/validate_rates_spreads_t2.py

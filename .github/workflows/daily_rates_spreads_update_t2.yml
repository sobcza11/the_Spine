name: daily_rates_spreads_update_t2

on:
  workflow_dispatch: {}
  schedule:
    - cron: "25 13 * * 1-5"

concurrency:
  group: rates-spreads-t2
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Build rates spreads T2
        shell: bash
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_REGION: ${{ secrets.R2_REGION }}
        run: |
          PYTHONPATH="${GITHUB_WORKSPACE}/src" python src/spine/jobs/rates/derive/build_rates_spreads_t2.py
          PYTHONPATH="${GITHUB_WORKSPACE}/src" python src/spine/jobs/rates/validate/validate_rates_spreads_t2.py
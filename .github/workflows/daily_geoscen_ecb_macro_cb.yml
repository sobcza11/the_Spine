name: Daily GeoScen ECB + macro_cb

on:
  workflow_dispatch:
  schedule:
    - cron: "25 14 * * 1-5"

jobs:
  refresh_ecb_macro_cb:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: ${{ github.workspace }}/src
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_REGION: ${{ secrets.R2_REGION }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pyarrow requests beautifulsoup4 boto3

      - name: Ingest ECB policy decisions
        run: python -m spine.jobs.geoscen.cb.ecb.ingest_ecb_policy_decisions_t1

      - name: Validate ECB policy decisions
        run: python -m spine.jobs.geoscen.cb.ecb.validate_ecb_policy_decisions_t1

      - name: Upload ECB policy decisions
        run: python -m spine.jobs.geoscen.cb.ecb.upload_ecb_policy_decisions_to_r2

      - name: Ingest ECB accounts
        run: python -m spine.jobs.geoscen.cb.ecb.ingest_ecb_accounts_t1

      - name: Validate ECB accounts
        run: python -m spine.jobs.geoscen.cb.ecb.validate_ecb_accounts_t1

      - name: Upload ECB accounts
        run: python -m spine.jobs.geoscen.cb.ecb.upload_ecb_accounts_to_r2

      - name: Build ECB combined canonical
        run: python -m spine.jobs.geoscen.cb.ecb.build_ecb_combined_canonical_v1

      - name: Validate ECB combined canonical
        run: python -m spine.jobs.geoscen.cb.ecb.validate_ecb_combined_canonical_v1

      - name: Upload ECB combined canonical
        run: python -m spine.jobs.geoscen.cb.ecb.upload_ecb_combined_canonical_to_r2

      - name: Build macro_cb canonical
        run: python -m spine.jobs.geoscen.cb.build_macro_cb_canonical_v1

      - name: Validate macro_cb canonical
        run: python -m spine.jobs.geoscen.cb.validate_macro_cb_canonical_v1

      - name: Upload macro_cb canonical
        run: python -m spine.jobs.geoscen.cb.upload_macro_cb_canonical_to_r2


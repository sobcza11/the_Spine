name: weekly_rates_yields_monthly_update_t1

on:
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch: {}

concurrency:
  group: rates-monthly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: ${{ github.workspace }}/src
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_REGION: auto
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir -r ./requirements.ci.txt

      - name: Build monthly rates yields leaf
        run: |
          python src/spine/jobs/rates/ingest/build_rates_yields_monthly_update_t1.py

      - name: Validate monthly rates yields leaf
        run: |
          python src/spine/jobs/rates/validate/validate_rates_yields_monthly_t1.py

      - name: Build monthly rates spreads
        run: |
          python src/spine/jobs/rates/derive/build_rates_spreads_t2.py

      - name: Build selected global rates serving panel
        run: |
          python src/spine/jobs/rates/derive/build_rates_selected_global_panel_t1.py

      - name: Build rates sigma rank
        run: |
          python src/spine/jobs/rates/derive/build_rates_sigma_rank_t2.py
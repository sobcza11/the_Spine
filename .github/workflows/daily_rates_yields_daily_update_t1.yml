name: daily_rates_yields_daily_update_t1

on:
  workflow_dispatch: {}
  schedule:
    - cron: "15 13 * * 1-5"

concurrency:
  group: rates-yields-daily-t1
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -e .

      - name: Update rates yields daily T1
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_REGION: ${{ secrets.R2_REGION }}
        run: |
          python -m spine.jobs.rates.ingest.build_rates_yields_daily_update_t1
          python -m spine.jobs.rates.validate.validate_rates_yields_daily_t1
          
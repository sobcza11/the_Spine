name: Daily Global Equity Region Update T1

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * 1-5"

jobs:
  update_global_equity_region:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: ${{ github.workspace }}/src
      TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_REGION: ${{ secrets.R2_REGION }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pandas pyarrow boto3 requests

      - name: Build global equity region canonical parquet
        run: python src/spine/jobs/equity/build_global_equity_region_update_t1.py

      - name: Export global equity region serving JSON
        run: python src/spine/jobs/equities/export_global_equity_region_serving_json.py

      - name: Upload global equity region serving to R2
        run: python src/spine/jobs/r2/upload_global_equity_serving_to_r2.py

